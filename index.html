<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polterabend Mallorca 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #f0f4f8; color: #333; line-height: 1.6; }
  .container { max-width: 960px; margin: 0 auto; padding: 20px; }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #1a3a5c 0%, #2e6da4 50%, #e67e22 100%);
    color: white; text-align: center; padding: 55px 40px; border-radius: 16px;
    margin-bottom: 30px; box-shadow: 0 8px 30px rgba(26,58,92,0.3);
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
  }
  .hero h1 { font-size: 44px; font-weight: 800; letter-spacing: 3px; margin-bottom: 4px; text-transform: uppercase; }
  .hero .subtitle { font-size: 22px; color: #ffd700; font-weight: 600; margin-bottom: 12px; }
  .hero .divider { width: 80px; height: 3px; background: #ffd700; margin: 0 auto 12px; border-radius: 2px; }
  .hero .info { font-size: 15px; opacity: 0.9; }
  .hero .emoji { font-size: 36px; margin-bottom: 10px; }

  /* NAV */
  .nav { background: white; border-radius: 12px; padding: 14px 20px; margin-bottom: 28px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .nav a { color: #2e6da4; text-decoration: none; font-size: 13px; font-weight: 500;
    padding: 6px 14px; border-radius: 20px; transition: all 0.2s; border: 1px solid #e0e7ef; }
  .nav a:hover { background: #2e6da4; color: white; }
</style>
</head>
<body>
<div class="container">
  <div class="hero" id="top">
    <div class="emoji">🇪🇸 🌴</div>
    <h1>MALLORCA</h1>
    <div class="subtitle">Polterabend Bräutigam</div>
    <div class="divider"></div>
    <div class="info">Fr 12. – So 14. Juni 2026 &nbsp;|&nbsp; 8 Männer &nbsp;|&nbsp; ab Zürich</div>
  </div>
  
  <div class="nav">
    <a href="#uebersicht">Übersicht</a>
    <a href="#vergleich">Destinationen</a>
    <a href="#flüge">Flüge</a>
  </div>
  
  <div class="section" id="uebersicht">
    <h2>Übersicht & Eckdaten</h2>
    <p>Willkommen zum Polterabend! Hier findest du alle wichtigen Informationen für ein unvergessliches Wochenende.</p>
  </div>
</div>
</body>
</html>
